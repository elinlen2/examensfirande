<!DOCTYPE html>
<html>
<head>
<style>
body { text-align: center; font-family: Arial; }
#letter { display: none; margin-top: 20px; }
</style>
</head>

<body>

<h2>Skriv lösenord för att öppna kuvertet</h2>
<input type="password" id="pass">
<button onclick="check()">Öppna kuvert</button>

<div id="letter">
    <h1>🎀 Inbjudan 🎀</h1>
    <p>Här är all information...</p>
</div>

<script>
function check() {
    if(document.getElementById("pass").value == "rosa123") {
        document.getElementById("letter").style.display = "block";
    } else {
        alert("Fel lösenord");
    }
}
</script>

</body>
</html>
