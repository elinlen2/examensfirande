<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Min Examensinbjudan</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #fef1f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #envelope-container {
            perspective: 1000px;
            position: relative;
            width: 300px;
            height: 200px;
            z-index: 10;
        }

        .envelope-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #f8bbd0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-radius: 0 0 10px 10px;
        }

        /* Locket */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 120px solid #f48fb1; 
            transform-origin: top;
            transition: transform 0.8s ease-in-out;
            z-index: 4; /* Ligger överst när det är stängt */
        }

        /* Fickan som döljer pappret */
        .letter-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Detta gör att inget syns utanför kuvertet */
            z-index: 2;
        }

        .letter {
            position: absolute;
            /* ÄNDRING: Startar precis vid botten av fickan så den inte kan sticka ut */
            top: 10px; 
            left: 10px;
            width: 280px;
            height: 180px;
            background: white;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            /* Mjuk glid-effekt */
            transition: transform 2.5s ease-in-out 0.8s, height 2.5s ease-in-out 0.8s;
       

        /* Kuvertets framsida */
        .front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid #fce4ec; 
            border-right: 150px solid #fce4ec; 
            border-bottom: 110px solid #f8bbd0; 
            border-top: 90px solid transparent;
            z-index: 3; /* Ligger framför pappret */
            pointer-events: none;
        }

        /* Animation när det öppnas */
        .open .flap {
            transform: rotateX(180deg);
            z-index: 1; /* Hamnar bakom när det öppnats */
        }

        .open .letter-container {
            overflow: visible; /* Tillåter pappret att glida ut */
        }

        .open .letter {
            transform: translateY(-200px); /* Åker UPPÅT */
            height: 380px; /* Blir längre för all text */
            z-index: 5; /* Hamnar framför allt när det kommit ut */
        }

        #password-container {
            margin-top: 30px;
            background: #f8bbd0;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            width: 260px;
            z-index: 20;
        }

        input {
            width: 80%;
            padding: 12px;
            font-size: 16px; /* Viktigt för mobilzoom! */
            border-radius: 20px;
            border: 1px solid #f48fb1;
            margin-bottom: 10px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            background: #ec407a;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="envelope-container">
        <div class="envelope-wrapper" id="envelope">
            <div class="flap"></div>
            
            <div class="letter-container">
                <div class="letter">
                    <h1 style="color:#ec407a; margin-top:0;">Min Examen!</h1>
                    <p>Välkommen på firande!</p>
                    <p><strong>Datum:</strong> 15 Juni</p>
                    <p><strong>Tid:</strong> 14:00</p>
                    <p>Hoppas vi ses!</p>
                </div>
            </div>
            
            <div class="front"></div>
        </div>
    </div>

    <div id="password-container">
        <h3 style="color: white; margin-top: 0;">Skriv lösenord</h3>
        <input type="password" id="passwordInput" placeholder="Lösenord">
        <br>
        <button onclick="checkPassword()">Öppna</button>
    </div>

    <script>
        function checkPassword() {
            var pass = document.getElementById("passwordInput").value;
            if (pass.toLowerCase() === "rosa") {
                document.getElementById("envelope").classList.add("open");
                document.getElementById("password-container").style.display = "none";
            } else {
                alert("Fel lösenord!");
            }
        }
    </script>
</body>
</html>
