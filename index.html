<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>

body {
  background: #ffe4ec;
  font-family: Arial;
  text-align: center;
  padding-top: 60px;
}

/* Kuvert container */
.container {
  position: relative;
  width: 320px;
  height: 220px;
  margin: auto;
  z-index: 1;
}

/* Kuvert */
.envelope {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ffb6c1;
  border-radius: 10px;
  z-index: 2;
}

/* Lock */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ff69b4;
  clip-path: polygon(0 0, 50% 50%, 100% 0);
  transform-origin: top;
  transition: 1s;
  z-index: 3;
}

/* Brev */
.letter {
  position: absolute;
  width: 260px;
  height: 160px;
  background: white;
  top: 40px;
  left: 30px;
  border-radius: 10px;
  padding: 15px;
  transform: translateY(60px);
  opacity: 0;
  transition: 1s;
  z-index: 1;
}

/* Öppna animation */
.open .flap {
  transform: rotateX(180deg);
}

.open .letter {
  transform: translateY(-20px);
  opacity: 1;
}

/* Input och knapp */
input, button {
  position: relative;
  z-index: 10;
  margin-top: 20px;
  padding: 10px;
  font-size: 16px;
}

button {
  background: #ff69b4;
  color: white;
  border: none;
  border-radius: 5px;
}

</style>
</head>

<body>

<h2> Öppna kuvertet</h2>
<p>Tips: Vilket år är jag född?</p>

<div class="container" id="box">
  <div class="letter">
    <h3>🎓 Examensfest 🎓</h3>
    <p>15 juni kl 18:00</p>
    <p>Min trädgård</p>
  </div>

  <div class="envelope"></div>
  <div class="flap"></div>
</div>

<input type="password" id="pwd" placeholder="Lösenord">
<br>
<button onclick="openEnvelope()">Öppna</button>

<script>
function openEnvelope() {
  let p = document.getElementById("pwd").value;

  if(p == "2004") {
    document.getElementById("box").classList.add("open");
  } else {
    alert("Fel lösenord");
  }
}
</script>

</body>
</html>
