<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Min Examensinbjudan</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #fef1f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #envelope-container {
            position: relative;
            width: 300px;
            height: 200px;
            margin-bottom: 50px;
        }

        /* Själva kuvertets bas (baksidan) */
        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: #f8bbd0; /* Lite mörkare rosa */
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Locket */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 120px solid #f48fb1; 
            transform-origin: top;
            transition: transform 0.6s ease-in-out;
            z-index: 3; /* Ligger över pappret när det är stängt */
        }

        /* Kuvertets framsida (V-formen som döljer pappret) */
        .front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid #fce4ec; /* Ljusrosa */
            border-right: 150px solid #fce4ec; 
            border-bottom: 110px solid #f8bbd0; 
            border-top: 90px solid transparent;
            z-index: 4; /* Ligger ALLTID framför pappret */
        }

        /* BREVET */
        .letter {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 280px;
            height: 180px;
            background: white;
            z-index: 2; /* Ligger mellan baksidan och framsidan */
            transition: transform 2s ease-in-out 0.8s, height 2s ease-in-out 0.8s;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .letter h1 { font-size: 18px; color: #ec407a; margin-top: 0; }
        .letter p { font-size: 14px; color: #555; margin: 8px 0; }

        /* ÖPPNA-ANIMATION */
        .open .flap {
            transform: rotateX(180deg);
            z-index: 1; /* Hamnar bakom när det öppnas */
        }

        .open .letter {
            transform: translateY(-180px); /* Glider uppåt */
            height: 350px; /* Växer */
            z-index: 5; /* Hamnar framför allt när det glidit ut */
        }

        /* LÖSENORD */
        #password-box {
            background: #f8bbd0;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            width: 260px;
        }

        input {
            width: 80%;
            padding: 12px;
            font-size: 16px; /* Stoppar iPhone-zoom */
            border-radius: 20px;
            border: 1px solid #f48fb1;
            margin-bottom: 10px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            background: #ec407a;
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="envelope-container">
        <div class="envelope" id="myEnvelope">
            <div class="flap"></div>
            
            <div class="letter">
                <h1>Min Examen!</h1>
                <p>Varmt välkomna på firande!</p>
                <p><strong>Datum:</strong> 15 Juni 2026</p>
                <p><strong>Tid:</strong> Kl 14:00</p>
                <p>Hoppas vi ses!</p>
            </div>
            
            <div class="front"></div>
        </div>
    </div>

    <div id="password-box">
        <h3 style="color: white; margin-top: 0;">Lösenord</h3>
        <input type="password" id="passInput" placeholder="Lösenord">
        <br>
        <button onclick="openLetter()">Öppna</button>
    </div>

    <script>
        function openLetter() {
            var p = document.getElementById("passInput").value;
            if(p.toLowerCase() === "rosa") {
                document.getElementById("myEnvelope").classList.add("open");
                document.getElementById("password-box").style.display = "none";
            } else {
                alert("Fel lösenord!");
            }
        }
    </script>
</body>
</html>
