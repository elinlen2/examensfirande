<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Min Examensinbjudan</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #fef1f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #envelope-container {
            position: relative;
            width: 300px;
            height: 200px;
            margin-bottom: 30px;
        }

        .envelope-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #f8bbd0;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        /* LOCKET */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 120px solid #f48fb1; 
            transform-origin: top;
            transition: transform 0.6s ease-in-out;
            z-index: 4; /* Ligger över pappret när det är stängt */
        }

        /* FRAMSIDAN (Den som döljer pappret i botten) */
        .front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid #fce4ec; 
            border-right: 150px solid #fce4ec; 
            border-bottom: 110px solid #f8bbd0; 
            border-top: 90px solid transparent;
            z-index: 3; /* Ligger framför pappret så det inte syns igenom */
            pointer-events: none;
        }

        /* PAPPPRET */
        .letter {
            position: absolute;
            top: 5px; /* Ligger inuti kuvertet */
            left: 10px;
            width: 280px;
            height: 180px;
            background: white;
            z-index: 2; /* Ligger BAKOM fronten och locket */
            transition: transform 2.5s ease-in-out 0.8s, height 2.5s ease-in-out 0.8s;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .letter h1 { font-size: 18px; color: #ec407a; margin-top: 0; }
        .letter p { font-size: 14px; color: #555; line-height: 1.4; }

        /* ÖPPNA-ANIMATION */
        .open .flap {
            transform: rotateX(180deg);
            z-index: 1; /* Hamnar bakom när det fälls upp */
        }

        .open .letter {
            transform: translateY(-200px); /* Åker UPPÅT */
            height: 380px; 
            z-index: 5; /* Hamnar längst fram när det är ute */
        }

        /* LÖSENORDSRUTAN */
        #password-container {
            background-color: #f8bbd0;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            width: 260px;
        }

        input {
            width: 80%;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #f48fb1;
            margin-bottom: 10px;
            text-align: center;
            outline: none;
            /* VIKTIGT: 16px font stoppar zoomen */
            font-size: 16px; 
        }

        button {
            padding: 10px 20px;
            background: #ec407a;
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="envelope-container">
        <div class="envelope-wrapper" id="envelope">
            <div class="flap"></div>
            
            <div class="letter">
                <h1>Min Examen!</h1>
                <p>Varmt välkomna att fira min stora dag med mig!</p>
                <p><strong>Datum:</strong> 15 Juni 2026</p>
                <p><strong>Tid:</strong> Kl 14:00 - sent</p>
                <p><strong>Plats:</strong> Min trädgård</p>
                <p>Hoppas vi ses!</p>
            </div>
            
            <div class="front"></div>
        </div>
    </div>

    <div id="password-container">
        <h3 style="color: white; margin-top: 0;">Skriv lösenord</h3>
        <input type="password" id="passwordInput" placeholder="Lösenord">
        <br>
        <button onclick="checkPassword()">Öppna</button>
    </div>

    <script>
        function checkPassword() {
            var pass = document.getElementById("passwordInput").value;
            if (pass.toLowerCase() === "rosa") {
                document.getElementById("envelope").classList.add("open");
                document.getElementById("password-container").style.display = "none";
            } else {
                alert("Fel lösenord!");
            }
        }
    </script>
</body>
</html>
