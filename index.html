<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Min Examensinbjudan</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #fef1f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #envelope-container {
            position: relative;
            width: 300px;
            height: 200px;
            margin-bottom: 50px;
        }

        /* DETTA ÄR FICKAN */
        .envelope-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #f8bbd0;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            /* VIKTIGASTE RADEN: Döljer allt papper som är "nere" i kuvertet */
            overflow: hidden; 
            z-index: 2;
        }

        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 120px solid #f48fb1; 
            transform-origin: top;
            transition: transform 0.6s ease-in-out;
            z-index: 5; /* Locket ligger överst */
        }

        .letter {
            position: absolute;
            top: 5px; /* Startar helt nere i fickan */
            left: 10px;
            width: 280px;
            height: 350px; /* Pappret är långt men döljs av wrappern */
            background: white;
            padding: 30px 20px;
            box-sizing: border-box;
            text-align: center;
            /* HÄR STYR VI FARTEN: 4 sekunder för en riktigt långsam avslöjande effekt */
            transition: transform 4s ease-in-out 0.8s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .letter h1 { font-size: 20px; color: #ec407a; margin-bottom: 20px; }
        .letter p { font-size: 16px; color: #555; margin: 15px 0; }

        /* ÖPPNA-ANIMATION */
        .open .flap {
            transform: rotateX(180deg);
        }

        .open .letter {
            /* Drar upp pappret så att texten visas lite i taget */
            transform: translateY(-300px); 
        }

        /* Denna lilla bit gör att pappret syns ovanför kuvertet när det åker ut */
        .open .envelope-wrapper {
            overflow: visible;
        }

        #password-container {
            background-color: #f8bbd0;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            width: 260px;
            z-index: 10;
        }

        input {
            width: 80%;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #f48fb1;
            margin-bottom: 10px;
            text-align: center;
            font-size: 16px; /* Ingen zoom på mobil */
            outline: none;
        }

        button {
            padding: 10px 25px;
            background: #ec407a;
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="envelope-container">
        <div class="flap"></div>
        
        <div class="envelope-wrapper" id="envelope">
            <div class="letter">
                <h1>Min Examen!</h1>
                <p>Välkommen på firande!</p>
                <p><strong>Datum:</strong> 15 Juni</p>
                <p><strong>Tid:</strong> 14:00</p>
                <p><strong>Plats:</strong> Min trädgård</p>
                <p>Hoppas vi ses!</p>
            </div>
        </div>
    </div>

    <div id="password-container">
        <h3 style="color: white; margin-top: 0;">Lösenord</h3>
        <input type="password" id="passwordInput" placeholder="Skriv här...">
        <br>
        <button onclick="checkPassword()">Öppna</button>
    </div>

    <script>
        function checkPassword() {
            var pass = document.getElementById("passwordInput").value;
            if (pass.toLowerCase() === "rosa") {
                document.getElementById("envelope-container").classList.add("open");
                document.getElementById("password-container").style.display = "none";
            } else {
                alert("Fel lösenord!");
            }
        }
    </script>
</body>
</html>
