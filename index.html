<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Min Examensinbjudan</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #fef1f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #envelope-container {
            perspective: 1000px;
            margin-bottom: 30px;
            position: relative;
            z-index: 10;
        }

        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 220px;
            background-color: #f8bbd0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-radius: 0 0 10px 10px;
        }

        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 130px solid #f48fb1; 
            transform-origin: top;
            transition: transform 0.8s ease-in-out;
            z-index: 4;
        }

        .front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid #fce4ec; 
            border-right: 160px solid #fce4ec; 
            border-bottom: 120px solid #f8bbd0; 
            border-top: 100px solid transparent;
            z-index: 3;
            border-radius: 0 0 10px 10px;
        }

        .letter {
            position: absolute;
            bottom: 10px; 
            left: 15px;
            width: 290px;
            height: 0px; 
            background: white;
            z-index: 2;
            /* Långsam animation för att dras upp */
            transition: transform 3s ease-in-out 0.8s, height 3s ease-in-out 0.8s;
            box-sizing: border-box;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow: hidden; 
        }

        .letter h1 { font-size: 22px; color: #ec407a; margin-top: 0; font-family: 'Georgia', serif; }
        .letter p { font-size: 14px; color: #555; margin: 8px 0; line-height: 1.4; }

        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-wrapper.open .letter {
            /* JUSTERAT: Åker upp lagom mycket (-150px istället för -280px) */
            transform: translateY(-150px); 
            /* JUSTERAT: Blir lagom högt (250px istället för 380px) */
            height: 250px; 
            z-index: 5;
        }

        #password-container {
            background-color: #f8bbd0;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 20;
        }

        input {
            padding: 12px;
            border-radius: 25px;
            border: 2px solid #f48fb1;
            margin-bottom: 15px;
            text-align: center;
            outline: none;
            font-size: 16px; /* Stoppar zoom på mobil */
        }

        button {
            padding: 10px 25px;
            background: #ec407a;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="envelope-container">
        <div class="envelope-wrapper" id="envelope">
            <div class="flap"></div>
            
            <div class="letter">
                <h1>Min Examen!</h1>
                <p>Varmt välkomna att fira min stora dag med mig!</p>
                <p><strong>Datum:</strong> 15 Juni 2026</p>
                <p><strong>Tid:</strong> Kl 14:00 - sent</p>
                <p><strong>Plats:</strong> Min trädgård</p>
                <p>OSA senast 1 Maj.</p>
                <p><i>Kramar!</i></p>
            </div>
            
            <div class="front"></div>
        </div>
    </div>

    <div id="password-container">
        <h3 style="color: white; margin: 0 0 15px 0;">Lås upp inbjudan</h3>
        <input type="password" id="passwordInput" placeholder="Lösenord">
        <br>
        <button onclick="checkPassword()">Öppna kuvertet</button>
    </div>

    <script>
        function checkPassword() {
            var pass = document.getElementById("passwordInput").value;
            if (pass.toLowerCase() === "rosa") {
                document.getElementById("envelope").classList.add("open");
                document.getElementById("password-container").style.display = "none";
            } else {
                alert("Fel lösenord!");
            }
        }
    </script>
</body>
</html>
