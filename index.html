<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Examensinbjudan</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fef1f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #envelope-container {
            perspective: 1000px;
            margin-bottom: 30px;
            position: relative;
            margin-top: 50px;
        }

        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: #f8bbd0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-radius: 0 0 10px 10px;
        }

        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 120px solid #f48fb1; 
            transform-origin: top;
            transition: transform 0.6s ease-in-out;
            z-index: 4;
        }

        .front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid #fce4ec; 
            border-right: 150px solid #fce4ec; 
            border-bottom: 110px solid #f8bbd0; 
            border-top: 90px solid transparent;
            z-index: 3;
            border-radius: 0 0 10px 10px;
        }

        /* --- HÄR ÄR ÄNDRINGEN FÖR PAPPPRET --- */
        .letter {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 280px;
            height: 180px;
            background: white;
            z-index: 2;
            /* Ändrad till 2.5 sekunder för ett mjukt glid */
            transition: transform 2.5s ease-in-out 0.6s, height 2.5s ease-in-out 0.6s;
            box-sizing: border-box;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-radius: 2px;
            overflow: hidden; /* Döljer texten tills den åker upp */
        }

        .letter h1 { font-size: 20px; margin-top: 0; color: #ec407a; }
        .letter p { font-size: 14px; color: #555; line-height: 1.5; margin: 8px 0; }

        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-wrapper.open .letter {
            transform: translateY(-200px); /* Åker upp lite högre */
            height: 350px; /* Växer långsamt till full längd */
            z-index: 5;
        }

        #password-container {
            background-color: #f8bbd0;
            padding: 20px 30px;
            border-radius: 15px;
            text-align: center;
            transition: opacity 0.5s ease-out;
        }

        input[type="password"] {
            padding: 12px;
            width: 200px;
            border: 2px solid #f48fb1;
            border-radius: 25px;
            margin-bottom: 10px;
            outline: none;
            text-align: center;
        }

        button {
            padding: 10px 25px;
            background-color: #ec407a;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="envelope-container">
        <div class="envelope-wrapper" id="envelope">
            <div class="flap"></div>
            <div class="letter">
                <h1>Min Examen!</h1>
                <p>Varmt välkomna att fira min stora dag med mig!</p>
                <p><strong>Datum:</strong> 15 Juni 2026</p>
                <p><strong>Tid:</strong> Kl 14:00</p>
                <p><strong>Plats:</strong> Min trädgård</p>
                <p><i>Kramar!</i></p>
            </div>
            <div class="front"></div>
        </div>
    </div>

    <div id="password-container">
        <h3 style="color: white; margin-top: 0;">Lås upp inbjudan</h3>
        <input type="password" id="passwordInput" placeholder="Lösenord">
        <br>
        <button onclick="checkPassword()">Öppna</button>
    </div>

    <script>
        function checkPassword() {
            var pass = document.getElementById("passwordInput").value;
            if (pass.toLowerCase() === "rosa") {
                document.getElementById("envelope").classList.add("open");
                var pwdContainer = document.getElementById("password-container");
                pwdContainer.style.opacity = "0";
                setTimeout(function(){ pwdContainer.style.display = "none"; }, 500);
            } else {
                alert("Fel lösenord!");
            }
        }
    </script>
</body>
</html>
