<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Examensinbjudan</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #fef1f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #envelope-container {
            perspective: 1000px;
            margin-bottom: 30px;
            position: relative;
        }

        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: #f8bbd0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-radius: 0 0 10px 10px;
            /* DENNA RAD GÖR ATT PAPPRET GÖMS INUTI */
            overflow: visible; 
        }

        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 120px solid #f48fb1; 
            transform-origin: top;
            transition: transform 0.6s ease-in-out;
            z-index: 4;
        }

        /* En extra container som klipper bort pappret när det är "nere" */
        .letter-container {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Här döljs allt som är utanför rosa rutan */
            top: 0;
            left: 0;
            z-index: 2;
        }

        .letter {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 280px;
            height: 180px;
            background: white;
            /* Startposition: helt nere och djupt i kuvertet */
            transform: translateY(0); 
            transition: transform 3s ease-in-out 0.7s;
            box-sizing: border-box;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-radius: 2px;
        }

        .letter h1 { font-size: 18px; color: #ec407a; margin-top: 0; }
        .letter p { font-size: 13px; color: #555; margin: 5px 0; }

        .front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid #fce4ec; 
            border-right: 150px solid #fce4ec; 
            border-bottom: 110px solid #f8bbd0; 
            border-top: 90px solid transparent;
            z-index: 3;
            pointer-events: none;
        }

        /* NÄR MAN ÖPPNAR */
        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        /* Nu tillåter vi pappret att synas utanför containern när det åker UPP */
        .envelope-wrapper.open .letter-container {
            overflow: visible;
        }

        .envelope-wrapper.open .letter {
            transform: translateY(-180px); /* Glider upp långsamt */
            z-index: 5;
        }

        #password-container {
            background-color: #f8bbd0;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        input {
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #f48fb1;
            margin-bottom: 10px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            background: #ec407a;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="envelope-container">
        <div class="envelope-wrapper" id="envelope">
            <div class="flap"></div>
            
            <div class="letter-container">
                <div class="letter">
                    <h1>Min Examen!</h1>
                    <p>Välkommen på firande!</p>
                    <p><strong>Datum:</strong> 15 Juni</p>
                    <p><strong>Tid:</strong> 14:00</p>
                    <p>Hoppas vi ses!</p>
                </div>
            </div>
            
            <div class="front"></div>
        </div>
    </div>

    <div id="password-container" id="login">
        <h3 style="color: white; margin: 0 0 10px 0;">Skriv lösenord</h3>
        <input type="password" id="passwordInput" placeholder="Lösenord">
        <br>
        <button onclick="checkPassword()">Öppna</button>
    </div>

    <script>
        function checkPassword() {
            var pass = document.getElementById("passwordInput").value;
            if (pass.toLowerCase() === "rosa") {
                document.getElementById("envelope").classList.add("open");
                document.getElementById("password-container").style.display = "none";
            } else {
                alert("Fel lösenord!");
            }
        }
    </script>
</body>
</html>
