<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Graduation Invitation</title>
<style>
body {
  background-color: #fff0f6; /* Ljus rosa bakgrund */
  font-family: Arial, sans-serif;
  text-align: center;
  padding-top: 100px;
}

#envelope-container {
  position: relative;
  width: 300px;
  height: 200px;
  margin: auto;
  perspective: 1000px;
}

#envelope {
  width: 100%;
  height: 100%;
  background-image: url('a_digital_screenshot_of_a_text_message_conversatio.png'); /* Rosa kuvertbild */
  background-size: cover;
  border-radius: 15px;
  transition: transform 1s;
  transform-origin: top;
}

#letter {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #fff0f6;
  border-radius: 15px;
  padding: 20px;
  display: none;
  box-sizing: border-box;
  border: 2px solid #ff69b4;
}

input[type="password"] {
  padding: 10px;
  width: 150px;
  margin-top: 20px;
}

button {
  padding: 10px 20px;
  margin-top: 10px;
  cursor: pointer;
  background-color: #ff69b4;
  color: white;
  border: none;
  border-radius: 5px;
  font-weight: bold;
}
</style>
</head>
<body>

<h2>🔒 Du har fått ett säkrat rosa kuvert</h2>
<p>Skriv lösenordet för att öppna kuvertet</p>
<p><b>Tips:</b> Något jag alltid dricker</p>

<div id="envelope-container">
  <div id="envelope"></div>
  <div id="letter">
    <h2>🎓 Examensfest 🎓</h2>
    <p>Du är inbjuden till min examensfest!</p>
    <p><b>Datum:</b> 15 juni</p>
    <p><b>Tid:</b> 18:00</p>
    <p><b>Plats:</b> [Din adress]</p>
    <p>OSA senast: [datum]</p>
    <p>Vi ses där! 🎉</p>
  </div>
</div>

<input type="password" id="pwd" placeholder="Skriv lösenord här">
<br>
<button onclick="checkPassword()">Öppna kuvert</button>

<script>
function checkPassword() {
  var password = document.getElementById("pwd").value;

  if(password.toLowerCase() == "kaffe") {
    var env = document.getElementById("envelope");
    var letter = document.getElementById("letter");

    // Kuvert “öppnas”
    env.style.transform = "rotateX(180deg)";
    setTimeout(function(){
      env.style.display = "none";
      letter.style.display = "block";
    }, 1000);
  } else {
    alert("Fel lösenord, försök igen!");
  }
}
</script>

</body>
</html>
