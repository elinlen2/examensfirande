<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Examensinbjudan</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #fef1f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden; /* Förhindrar darr i sidled på mobilen */
        }

        /* Behållaren - anpassas efter skärmbredd */
        #envelope-container {
            perspective: 1000px;
            position: relative;
            width: 320px; /* Standardbredd */
            margin-bottom: 50px;
        }

        .envelope-wrapper {
            position: relative;
            width: 100%;
            height: 200px;
            background-color: #f8bbd0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-radius: 0 0 10px 10px;
        }

        /* Locket */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 120px solid #f48fb1; 
            transform-origin: top;
            transition: transform 0.8s ease-in-out;
            z-index: 4;
        }

        /* Framsidan */
        .front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid #fce4ec; 
            border-right: 160px solid #fce4ec; 
            border-bottom: 110px solid #f8bbd0; 
            border-top: 90px solid transparent;
            z-index: 3;
            border-radius: 0 0 10px 10px;
        }

        /* Brevet - Anpassat för att inte bli för brett */
        .letter {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px; /* Använder right istället för fast bredd */
            height: 0px;
            background: white;
            z-index: 2;
            transition: transform 2.5s ease-in-out 0.8s, height 2.5s ease-in-out 0.8s;
            box-sizing: border-box;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .letter h1 { font-size: 1.2rem; color: #ec407a; margin-top: 0; }
        .letter p { font-size: 0.9rem; color: #555; margin: 5px 0; }

        /* Mobil-specifika justeringar */
        @media (max-width: 400px) {
            #envelope-container {
                width: 280px; /* Smalare kuvert på små telefoner */
            }
            .flap {
                border-left-width: 140px;
                border-right-width: 140px;
            }
            .front {
                border-left-width: 140px;
                border-right-width: 140px;
            }
            .letter h1 { font-size: 1rem; }
            .letter p { font-size: 0.8rem; }
        }

        /* Animation */
        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-wrapper.open .letter {
            transform: translateY(-240px); 
            height: 340px; 
            z-index: 5;
        }

        #password-container {
            background-color: #f8bbd0;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            width: 80%;
            max-width: 250px;
        }

        input {
            width: 90%;
            padding: 10px;
            border-radius: 20px;
            border: 2px solid #f48fb1;
            margin-bottom: 10px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            background: #ec407a;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="envelope-container">
        <div class="envelope-wrapper" id="envelope">
            <div class="flap"></div>
            <div class="letter">
                <h1>Min Examen!</h1>
                <p>Välkommen på firande!</p>
                <p><strong>Datum:</strong> 15 Juni 2026</p>
                <p><strong>Tid:</strong> 14:00</p>
                <p><strong>Plats:</strong> Min trädgård</p>
                <p>OSA senast 1 Maj.</p>
                <p><i>Kramar!</i></p>
            </div>
            <div class="front"></div>
        </div>
    </div>

    <div id="password-container">
        <h3 style="color: white; margin-top: 0;">Lösenord</h3>
        <input type="password" id="passwordInput" placeholder="Skriv här...">
        <br>
        <button onclick="checkPassword()">Öppna</button>
    </div>

    <script>
        function checkPassword() {
            var pass = document.getElementById("passwordInput").value;
            if (pass.toLowerCase() === "rosa") {
                document.getElementById("envelope").classList.add("open");
                document.getElementById("password-container").style.display = "none";
            } else {
                alert("Fel lösenord!");
            }
        }
    </script>
</body>
</html>
