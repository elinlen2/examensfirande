<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Kuvert</title>

<style>
body{
  background:#ffe4ec;
  text-align:center;
  font-family:Arial;
  padding-top:50px;
}

/* Input */
input{
  padding:12px;
  font-size:18px;
  margin:10px;
}

button{
  padding:12px 20px;
  font-size:18px;
  background:#ff4fa3;
  color:white;
  border:none;
  cursor:pointer;
}

/* Kuvert */
.envelope{
  width:320px;
  height:200px;
  background:#ff4fa3;
  margin:40px auto;
  position:relative;
  border-radius:12px;
  overflow:hidden;
}

/* Lock */
.flap{
  position:absolute;
  width:320px;
  height:160px;
  background:#ff4fa3;
  top:0;
  left:0;
  clip-path: polygon(0 0, 50% 60%, 100% 0);
  transform-origin:top;
  transition:1s;
}

/* Brev */
.letter{
  position:absolute;
  width:260px;
  height:150px;
  background:white;
  left:30px;
  top:40px;
  padding:15px;
  border-radius:10px;
  transform:translateY(80px);
  opacity:0;
  transition:1s;
}

/* Öppna */
.open .flap{
  transform:rotateX(180deg);
}

.open .letter{
  transform:translateY(-10px);
  opacity:1;
}
</style>
</head>

<body>

<h2>Öppna kuvertet</h2>
<p>Tips: Vilket år är jag född?</p>

<input type="password" id="pwd" placeholder="Lösenord">
<br>
<button onclick="openEnvelope()">Öppna</button>

<div class="envelope" id="env">
  <div class="flap"></div>
  <div class="letter">
    <h3>🎓 Examensfest 🎓</h3>
    <p>Datum: 15 juni</p>
    <p>Tid: 18:00</p>
    <p>Du är inbjuden!</p>
  </div>
</div>

<script>
function openEnvelope(){
  var p = document.getElementById("pwd").value;

  if(p == "2004"){
    document.getElementById("env").classList.add("open");
  } else {
    alert("Fel lösenord");
  }
}
</script>

</body>
</html>
