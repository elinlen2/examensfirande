<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Examensinbjudan</title>

<style>
body{
  background:#ffe4ec;
  text-align:center;
  font-family:Arial;
  padding-top:50px;
}

/* Input */
input{
  padding:12px;
  font-size:18px;
  margin:10px;
}

button{
  padding:12px 20px;
  font-size:18px;
  background:#ff4fa3;
  color:white;
  border:none;
  cursor:pointer;
}

/* Kuvert */
.envelope{
  width:320px;
  height:200px;
  background:#ff4fa3;
  margin:40px auto;
  position:relative;
  border-radius:12px;
}

/* Lock */
.flap{
  position:absolute;
  width:320px;
  height:160px;
  background:#ff4fa3;
  top:0;
  left:0;
  clip-path: polygon(0 0, 50% 60%, 100% 0);
  transform-origin:top;
  transition:1s;
  z-index:3;
}

/* Brev */
.letter{
  position:absolute;
  width:260px;
  height:150px;
  background:white;
  left:30px;
  top:40px;
  padding:15px;
  border-radius:10px;
  transform:translateY(80px);
  transition:1s;
  z-index:2;
}

/* Kuvert framkant */
.front{
  position:absolute;
  width:320px;
  height:100px;
  background:#ff4fa3;
  bottom:0;
  left:0;
  border-radius:0 0 12px 12px;
  z-index:4;
}

/* Öppna */
.open .flap{
  transform:rotateX(180deg);
  z-index:1;
}

.open .letter{
  transform:translateY(-60px);
}
</style>
</head>

<body>

<h2>🔒 Öppna kuvertet</h2>
<p>Tips: Vilket år är jag född?</p>

<input type="password" id="pwd" placeholder="Lösenord">
<br>
<button onclick="openEnvelope()">Öppna</button>

<div class="envelope" id="env">
  <div class="letter">
    <h3>🎓 Examensfest 🎓</h3>
    <p>Datum: 15 juni</p>
    <p>Tid: 18:00</p>
    <p>Plats: Hemma hos mig</p>
    <p>OSA senast 1 maj</p>
  </div>

  <div class="flap"></div>
  <div class="front"></div>
</div>

<script>
function openEnvelope(){
  var p = document.getElementById("pwd").value;

  if(p == "2002"){
    document.getElementById("env").classList.add("open");
  } else {
    alert("Fel lösenord");
  }
}
</script>

</body>
</html>
