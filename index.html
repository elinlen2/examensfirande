<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>

body {
  background: #fdeef4;
  text-align: center;
  font-family: Arial;
  padding-top: 100px;
}

.container {
  position: relative;
  width: 300px;
  height: 200px;
  margin: auto;
}

/* Brevet (bakom) */
.letter {
  position: absolute;
  width: 260px;
  height: 160px;
  background: white;
  top: 40px;
  left: 20px;
  border-radius: 10px;
  padding: 10px;
  box-sizing: border-box;
  transform: translateY(60px);
  opacity: 0;
  transition: 1s;
}

/* Kuvert botten */
.envelope {
  position: absolute;
  width: 100%;
  height: 100%;
  background: pink;
  clip-path: polygon(0 50%, 50% 100%, 100% 50%, 100% 100%, 0 100%);
}

/* Lock */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: hotpink;
  clip-path: polygon(0 0, 50% 50%, 100% 0);
  transform-origin: top;
  transition: 1s;
}

/* ÖPPNAT */
.open .flap {
  transform: rotateX(180deg);
}

.open .letter {
  transform: translateY(-20px);
  opacity: 1;
}

</style>
</head>

<body>

<h2>🔒 Öppna ditt kuvert</h2>
<p><b>Tips:</b> Vilket år är jag född?</p>

<div class="container" id="box">
  <div class="letter">
    <h3>🎓 Examensfest 🎓</h3>
    <p>15 juni kl 18:00</p>
    <p>Min trädgård</p>
  </div>

  <div class="envelope"></div>
  <div class="flap"></div>
</div>

<input type="password" id="pwd">
<br>
<button onclick="openEnvelope()">Öppna</button>

<script>
function openEnvelope() {
  let p = document.getElementById("pwd").value;

  if(p.toLowerCase() == "2004") {
    document.getElementById("box").classList.add("open");
  } else {
    alert("Fel lösenord");
  }
}
</script>

</body>
</html>
